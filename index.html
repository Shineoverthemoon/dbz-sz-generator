<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparking! ZERO — Team Battle Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ki:    #FFD700;
  --blue:  #1A6EFF;
  --dark:  #060810;
  --panel: #0D1020;
  --card:  #111428;
  --border:#1E2440;
  --text:  #E8EEFF;
  --dim:   #5A6080;
  --red:   #FF3A3A;
  --aura:  rgba(255,215,0,0.12);
}

body{
  background:var(--dark);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px 14px 72px;
  overflow-x:hidden;
}

/* ── animated bg ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(26,110,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 80%, rgba(255,215,0,0.05) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

/* ── header ── */
.header{text-align:center;position:relative;z-index:1;margin-bottom:8px;}
.title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.4rem,6vw,2.8rem);
  font-weight:900;
  letter-spacing:0.06em;
  color:var(--ki);
  text-shadow:0 0 30px rgba(255,215,0,0.4);
  line-height:1;
}
.subtitle{
  font-size:0.7rem;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--dim);
  margin-top:6px;
}

/* ── main card ── */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px 20px;
  width:100%;
  max-width:800px;
  position:relative;
  z-index:1;
  margin-top:24px;
}

/* ── controls row ── */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:flex-end;
  margin-bottom:20px;
}

.ctrl-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px;}
.ctrl-label{
  font-size:0.62rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--dim);
}
select, .team-size-btn{
  background:#0A0D1A;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:0.85rem;
  padding:10px 12px;
  cursor:pointer;
  outline:none;
}
select:focus{border-color:var(--blue);}

.size-btns{display:flex;gap:6px;}
.size-btn{
  background:#0A0D1A;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--dim);
  font-family:'Orbitron',sans-serif;
  font-size:0.8rem;
  font-weight:700;
  padding:9px 14px;
  cursor:pointer;
  transition:all 0.15s;
  flex:1;
}
.size-btn:hover{border-color:var(--blue);color:var(--text);}
.size-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ── generate btn ── */
.btn-gen{
  font-family:'Orbitron',sans-serif;
  font-size:0.9rem;
  font-weight:700;
  letter-spacing:0.1em;
  background:linear-gradient(135deg, #FFB800, #FF6A00);
  color:#000;
  border:none;
  border-radius:8px;
  padding:13px 32px;
  cursor:pointer;
  transition:transform 0.12s, box-shadow 0.15s;
  white-space:nowrap;
  align-self:flex-end;
}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(255,184,0,0.35);}
.btn-gen:active{transform:scale(0.97);}
.btn-gen:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── result ── */
#result{display:none;flex-direction:column;gap:16px;}

/* teams row */
.teams-row{
  display:grid;
  grid-template-columns:1fr 48px 1fr;
  gap:0;
  align-items:start;
}
.team-panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 14px;
}
.team-label{
  font-family:'Orbitron',sans-serif;
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.team-label.joe{color:var(--blue);}
.team-label.jack{color:var(--red);}

.fighter-chip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 0;
  border-bottom:1px solid #141828;
  font-size:0.82rem;
}
.fighter-chip:last-child{border-bottom:none;}
.chip-num{
  font-family:'Orbitron',sans-serif;
  font-size:0.6rem;
  font-weight:700;
  color:var(--dim);
  width:16px;
  flex-shrink:0;
}
.chip-name{color:var(--text);}

.vs-col{
  display:flex;
  align-items:center;
  justify-content:center;
  padding-top:20px;
}
.vs-badge{
  font-family:'Orbitron',sans-serif;
  font-size:1.1rem;
  font-weight:900;
  color:var(--ki);
  text-shadow:0 0 12px rgba(255,215,0,0.5);
}

/* ── scenario box ── */
.scenario-box{
  background:var(--card);
  border:1px solid var(--border);
  border-left:3px solid var(--ki);
  border-radius:10px;
  padding:18px 16px;
}
.scenario-label{
  font-size:0.6rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--ki);
  margin-bottom:10px;
  font-weight:600;
}
.scenario-text{
  font-size:0.87rem;
  line-height:1.65;
  color:#B0B8D8;
  min-height:60px;
}
.scenario-text.loading{
  color:var(--dim);
  font-style:italic;
}

/* typing cursor */
.cursor{
  display:inline-block;
  width:2px;
  height:0.9em;
  background:var(--ki);
  margin-left:2px;
  vertical-align:text-bottom;
  animation:blink 0.7s steps(1) infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── filter pills ── */
.filter-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:16px;
}
.pill{
  font-size:0.7rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:5px 10px;
  border-radius:20px;
  border:1px solid var(--border);
  background:#0A0D1A;
  color:var(--dim);
  cursor:pointer;
  transition:all 0.12s;
}
.pill:hover{border-color:var(--blue);color:var(--text);}
.pill.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#0A0D1A;}
::-webkit-scrollbar-thumb{background:#222840;border-radius:3px;}

@media(max-width:500px){
  .teams-row{grid-template-columns:1fr 36px 1fr;}
  .vs-badge{font-size:0.85rem;}
}
</style>
</head>

// ── State ─────────────────────────────────────────────────
let teamSize = 5;
let activeFilter = 'all';

// ── Filter pills ──────────────────────────────────────────
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFilter = p.dataset.filter;
  });
});

// ── Size buttons ──────────────────────────────────────────
document.querySelectorAll('.size-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    teamSize = parseInt(b.dataset.size);
  });
});

// ── Helpers ───────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getPool() {
  if (activeFilter === 'all') return ALL;
  return ALL.filter(c => c.t.includes(activeFilter));
}

function pickTeam(pool, exclude = []) {
  const available = pool.filter(c => !exclude.includes(c.n));
  return shuffle(available).slice(0, teamSize);
}

function renderTeam(fighters, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = fighters.map((f, i) => `
    <div class="fighter-chip">
      <span class="chip-num">${i+1}</span>
      <span class="chip-name">${f.n}</span>
    </div>
  `).join('');
}

function generateScenario(joeTeam, jackTeam) {
  const template = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
  const joeLeader  = joeTeam[0].n;
  const jackLeader = jackTeam[0].n;
  return template
    .replace(/\{A\}/g, joeLeader)
    .replace(/\{B\}/g, jackLeader)
    .replace(/\{JOE\}/g, joeTeam.map(f=>f.n).join(', '))
    .replace(/\{JACK\}/g, jackTeam.map(f=>f.n).join(', '));
}

// ── Typewriter effect ─────────────────────────────────────
function typewrite(el, text, speed = 18) {
  el.innerHTML = '';
  el.classList.remove('loading');
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);

  const tick = () => {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i++]), cursor);
      setTimeout(tick, speed);
    } else {
      cursor.remove();
    }
  };
  tick();
}

// ── Generate ──────────────────────────────────────────────
document.getElementById('genBtn').addEventListener('click', () => {
  const pool = getPool();
  if (pool.length < teamSize * 2) {
    alert(`Not enough fighters in this filter for ${teamSize}v${teamSize}. Try a larger pool.`);
    return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;

  const joeTeam  = pickTeam(pool);
  const jackTeam = pickTeam(pool, joeTeam.map(f => f.n));

  renderTeam(joeTeam, 'teamJoe');
  renderTeam(jackTeam, 'teamJack');

  document.getElementById('result').style.display = 'flex';
  const scenarioEl = document.getElementById('scenarioText');
  scenarioEl.className = 'scenario-text loading';
  scenarioEl.textContent = '';

  const text = generateScenario(joeTeam, jackTeam);
  typewrite(scenarioEl, text);

  btn.disabled = false;
  btn.textContent = '⚡ GENERATE BATTLE';
});
</script>
