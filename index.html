<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ball: Sparking! ZERO — Battle Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ki:#FFD700;--blue:#1A6EFF;--dark:#060810;--panel:#0D1020;--card:#111428;--border:#1E2440;--text:#E8EEFF;--dim:#5A6080;--red:#FF3A3A;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 72px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(26,110,255,0.07) 0%,transparent 70%),radial-gradient(ellipse 50% 35% at 80% 80%,rgba(255,215,0,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:8px;}
.title{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,5vw,2.4rem);font-weight:900;letter-spacing:0.06em;color:var(--ki);text-shadow:0 0 30px rgba(255,215,0,0.4);line-height:1;}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:22px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#0A0D1A;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--blue);color:var(--text);}
.pill.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.pill.dlc.active{background:#9B30FF;border-color:#9B30FF;}
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:20px;}
.ctrl-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px;}
.ctrl-label{font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);}
.size-btns{display:flex;gap:6px;}
.size-btn{background:#0A0D1A;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-family:'Orbitron',sans-serif;font-size:0.75rem;font-weight:700;padding:9px 12px;cursor:pointer;transition:all 0.15s;flex:1;}
.size-btn:hover{border-color:var(--blue);color:var(--text);}
.size-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-gen{font-family:'Orbitron',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.1em;background:linear-gradient(135deg,#FFB800,#FF6A00);color:#000;border:none;border-radius:8px;padding:13px 28px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;white-space:nowrap;align-self:flex-end;}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(255,184,0,0.35);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;}
.teams-row{display:grid;grid-template-columns:1fr 48px 1fr;align-items:start;}
.team-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 12px;}
.team-label{font-family:'Orbitron',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.team-label.joe{color:var(--blue);}
.team-label.jack{color:var(--red);}
.fighter-chip{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #141828;font-size:0.82rem;}
.fighter-chip:last-child{border-bottom:none;}
.chip-num{font-family:'Orbitron',sans-serif;font-size:0.6rem;font-weight:700;color:var(--dim);width:16px;flex-shrink:0;}
.vs-col{display:flex;align-items:center;justify-content:center;padding-top:20px;}
.vs-badge{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--ki);text-shadow:0 0 12px rgba(255,215,0,0.5);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--ki);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ki);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#B0B8D8;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--ki);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:#AAA;transition:all 0.15s;margin-top:10px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tts-btn:hover{background:rgba(255,255,255,0.1);color:#FFF;border-color:rgba(255,255,255,0.25);}
.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}
</style>
</head>

</div>

  "Android 17 set up a nature reserve that spans three universes. {B}'s team entered without reading the signs. The signs specifically said this was protected territory. {A}'s team is the enforcement division. 17 approved this operation personally.",
  "The Fusion technique requires equal power levels and perfect synchronization. Someone attempted a fusion that produced not a new being but a resonance wave that pulled every fighter in the vicinity into combat mode. {A} and {B} are both caught in the wave. The original fusees have no idea this happened.",
  "Piccolo agreed to train {A}'s team. The training is a battle against {B}'s team. Piccolo didn't tell either side he'd made this arrangement. Both teams arrived expecting something different. Piccolo is watching from a cliff with his arms crossed, which means this is going exactly as planned.",
  "The two strongest fighters in this room have been locked into a battle by the laws of ki physics — when power levels above a certain threshold meet, combat becomes thermodynamically inevitable. Everyone else got pulled into it because that's how ki physics works.",
];

let activeFilter='all', teamSize=5;
document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;});});
document.querySelectorAll('.size-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.size-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');teamSize=parseInt(b.dataset.size);});});
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){return activeFilter==='all'?ALL:ALL.filter(c=>c.t.includes(activeFilter));}
function pickTeam(pool,exclude=[]){return shuffle(pool.filter(c=>!exclude.includes(c.n))).slice(0,teamSize);}
function renderTeam(fighters,id){document.getElementById(id).innerHTML=fighters.map((f,i)=>`<div class="fighter-chip"><span class="chip-num">${i+1}</span><span>${f.n}</span></div>`).join('');}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<teamSize*2){alert('Not enough fighters in this filter. Try All or a bigger pool.');return;}
  const joe=pickTeam(pool), jack=pickTeam(pool,joe.map(f=>f.n));
  renderTeam(joe,'teamJoe');renderTeam(jack,'teamCpu');
  document.getElementById('result').style.display='flex';
  document.getElementById('ttsBtn').style.display='inline-flex';
  const t=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
  typewrite(document.getElementById('scenarioText'),t.replace(/\{A\}/g,joe[0].n).replace(/\{B\}/g,jack[0].n));
});
</script>

<script>
// ── TTS (OpenAI Nova via proxy) ───────────────────────────
const TTS_URL = 'https://tts-proxy-i1sn.onrender.com';
let ttsAudio = null;

function speakBtn(btn) {
  const el = document.getElementById('scenarioText');
  const txt = (el ? (el.innerText || el.textContent) : '').trim();
  if (!txt) { return; }
  speakScenario(btn, txt);
}

async function speakScenario(btn, text) {
  // iOS audio unlock MUST happen synchronously before any await
  if (!ttsAudio) {
    ttsAudio = new Audio();
    ttsAudio.play().catch(()=>{});
    ttsAudio.pause();
  }

  // stop if already playing
  if (ttsAudio && !ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  // get the actual rendered text from the DOM right now
  const el = document.getElementById('scenarioText');
  const actualText = (el ? (el.innerText || el.textContent) : text).trim();

  if (!actualText || actualText.length < 5) {
    btn.textContent = '⏳ Still generating...';
    setTimeout(() => { btn.textContent = '🔊 Read Aloud'; }, 1500);
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: actualText})
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    await ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
    alert('TTS error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
